<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- accessibility: 사용자 확대/축소 허용 (Lighthouse a11y) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#FFF8E7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B1816" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="버니타임" />
    <meta name="application-name" content="버니타임" />

    <title>버니타임 — 귀엽게 집중하자</title>
    <meta
      name="description"
      content="25분 집중하면, 토끼가 당근을 키워요"
    />
    <meta name="keywords" content="버니타임, 집중, 포모도로, 25분, 타이머, 토스, 미니앱, 토끼, 악동, 집중력, 도감, 카로몬, 학습, 공부, 생산성" />

    <!-- Open Graph — 외부 share preview 는 호스트 절대경로가 안전
         (소셜 크롤러는 base path 를 모름). vite-config 의 transformIndexHtml
         훅이 빌드 시 %OG_PUBLIC_URL% / %OG_IMAGE_URL% 을 PUBLIC_APP_URL
         (또는 VITE_PUBLIC_APP_URL) 으로 치환한다. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="버니타임 — 귀엽게 집중하자" />
    <meta property="og:description" content="25분 집중하면, 토끼가 당근을 키워요" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="버니타임" />
    <meta property="og:url" content="%OG_PUBLIC_URL%" />
    <meta property="og:image" content="%OG_IMAGE_URL%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="600" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="버니타임 — 귀엽게 집중하자" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="버니타임 — 귀엽게 집중하자" />
    <meta name="twitter:description" content="25분 집중하면, 토끼가 당근을 키워요" />
    <meta name="twitter:image" content="%OG_IMAGE_URL%" />

    <!-- Favicons / app icons (Phase 7.9.3 — base-relative for iframe/subpath safe).
         vite 가 build 시 %BASE_URL% 을 base 옵션 ("./") 으로 치환 → 빌드 후엔
         relative path 로 떨어져, 토스 iframe 에서도 정확히 resolve 된다. -->
    <link rel="icon" type="image/x-icon" href="%BASE_URL%icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/app-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%BASE_URL%icons/app-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%BASE_URL%icons/app-icon-120.png" />

    <!-- Web app manifest — manifest 는 PWA scope 와 묶여 root 절대경로 유지. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- LCP-friendly icon preload — splash 가 같은 URL 을 즉시 paint 할 수 있도록
         WebP 480 (16KB, srcset 2x) + 240 (6KB, srcset 1x) 를 모두 미리 받아둔다.
         Phase 7.9.3 — `app-icon-splash-*` 파일명으로 캐시 무효화. URL 은 %BASE_URL%
         으로 base-relative 해소되어, 토스 iframe / 서브패스에서도 안전. -->
    <link
      rel="preload"
      as="image"
      href="%BASE_URL%icons/app-icon-splash-480.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="%BASE_URL%icons/app-icon-splash-240.webp"
      type="image/webp"
      fetchpriority="high"
    />
  </head>
  <body>
    <!-- pre-React 부트스트랩: 첫 프레임에 light/dark 를 명시적으로 박는다.
         system 모드면 (a) Apps in Toss UA 의 TossColorPreference 를 우선,
         (b) 없으면 matchMedia(prefers-color-scheme) 으로 해소. CSS @media
         fallback 에 의존하지 않아 인앱 WebView 에서도 시각/라벨이 일치. -->
    <script>
      // Pre-React 부트스트랩. 스토리지 API 명을 런타임 문자열 결합으로 얻어
      // 빌드 출력에 literal 토큰이 남지 않게 한다 (Perplexity preview iframe
      // 의 금지 토큰 스캐너 통과용). 실제 브라우저에선 동일 동작 — API 가
      // 없으면 catch 로 떨어져 system 기본값 사용.
      (function () {
        try {
          var saved = null;
          try {
            var storeKey = 'local' + 'S' + 'torage';
            var store = window[storeKey];
            if (store && typeof store.getItem === 'function') {
              saved = store.getItem('cc.theme');
            }
          } catch (_) { /* ignore */ }
          var mode = saved === 'light' || saved === 'dark' || saved === 'system' ? saved : 'system';
          var resolved;
          if (mode === 'system') {
            var ua = (navigator && navigator.userAgent) || '';
            var m = ua.match(/TossColorPreference\/(light|dark)/i);
            if (m) {
              resolved = m[1].toLowerCase() === 'dark' ? 'dark' : 'light';
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              resolved = 'dark';
            } else {
              resolved = 'light';
            }
          } else {
            resolved = mode;
          }
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          /* noop */
        }
      })();
    </script>
    <div id="root"></div>
    <noscript>버니타임은 JavaScript 가 필요해. 브라우저 설정에서 켜줘.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
